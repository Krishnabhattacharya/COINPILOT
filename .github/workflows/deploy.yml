name: Deploy Flutter Web to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-flutter:
    name: Build Flutter & Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: flutter-app
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: flutter-app
        run: flutter build web --release --web-renderer canvaskit

      - name: Deploy to Vercel
        working-directory: flutter-app/build/web
        run: npx vercel --prebuilt --prod --token=${{ secrets.VERCEL_FLUTTER_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FLUTTER_PROJECT_ID }}
